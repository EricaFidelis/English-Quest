        .animate-shake { animation: shake 0.2s ease-in-out 2; }

        /* Bandeira do Reino Unido Estilizada */
        .uk-flag {
            width: 40px; height: 25px; background: #00247d; position: relative;
            overflow: hidden; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
        }

            content: ""; position: absolute; background: white;

        .uk-flag::before { width: 100%; height: 6px; top: 9px; }
        .uk-flag::after { width: 6px; height: 100%; left: 17px; }
        .uk-red-cross {
            position: absolute; background: #cf142b; z-index: 1;
        }
        .uk-v { width: 100%; height: 2px; top: 11px; }
        .uk-h { width: 2px; height: 100%; left: 19px; }

        .linkedin-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            display: flex; align-items: center; gap: 10px; padding: 10px 16px;
            border-radius: 12px; background: #0077b5; color: white;

    </style>

        ];

        let score = 0, highscore = 0, lives = 3, timeLeft = 100, timerInterval;
        let pool = [], currentWord = {}, correctBtnIndex = 0;

        function initGame() {
            const niche = document.getElementById('nicheSelect').value;
            let filtered = niche === 'all' ? [...allWords] : allWords.filter(w => w.cat === niche);
            pool = filtered.sort(() => Math.random() - 0.5);
            nextQuestion();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB'; 
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function nextQuestion() {
            if (pool.length === 0) {
                alert("CONGRATULATIONS! ALL WORDS COMPLETED.");
                return initGame();
            }

            document.getElementById('gameCard').classList.remove('animate-shake');
            currentWord = pool.pop();
            
            let wrong;
            do { wrong = allWords[Math.floor(Math.random() * allWords.length)]; } while (wrong.pt === currentWord.pt);

            correctBtnIndex = Math.floor(Math.random() * 2);
            document.getElementById('targetWord').innerText = currentWord.eng;
            document.getElementById('categoryLabel').innerText = currentWord.cat;
            document.getElementById(`opt${correctBtnIndex}`).innerText = currentWord.pt;
            document.getElementById(`opt${1 - correctBtnIndex}`).innerText = wrong.pt;
            
            speak(currentWord.eng);
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 100;
            timerInterval = setInterval(() => {
                timeLeft -= 1.0; 
                document.getElementById('timerBar').style.width = timeLeft + "%";
                if (timeLeft <= 0) { clearInterval(timerInterval); handleWrong(); }
            }, 100);
        }

        function handleChoice(idx) {
            clearInterval(timerInterval);
            if (idx === correctBtnIndex) {
                score += 10;
                if (score > highscore) highscore = score;
                updateUI();
                nextQuestion();
            } else { handleWrong(); }
        }

        function handleWrong() {
            lives--;
            document.getElementById('gameCard').classList.add('animate-shake');
            updateUI();
            if (lives <= 0) {
                document.getElementById('finalScore').innerText = score;
                document.getElementById('gameOverModal').classList.remove('hidden');
                document.getElementById('gameOverModal').classList.add('flex');
            } else { setTimeout(nextQuestion, 500); }
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('highscore').innerText = highscore;
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`heart${i}`).style.opacity = i <= lives ? "1" : "0.1";
            }
        }

        function resetGame() {
            score = 0; lives = 3;
            document.getElementById('gameOverModal').classList.add('hidden');
            updateUI();
            initGame();
        }

        initGame();
    </script>
